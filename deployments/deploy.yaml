version: 1
defaultProfile: cloud-hosted.split-services.production

profiles:
  cloud-hosted.split-services.production:
    install:
      layout: binary-package
    expose:
      - domain: aiot.sdkwork.com
        tls: sdkwork.com
        mode: web+api
        web: adaptive
    packages:
      - server

  self-hosted.split-services.production:
    install:
      layout: binary-package
    expose:
      - domain: aiot.local
        tls: off
        mode: web+api
        web: adaptive
    packages:
      - server

  self-hosted.split-services.development:
    expose:
      - domain: localhost
        tls: off
        mode: web+api
        web: adaptive
    packages: []
