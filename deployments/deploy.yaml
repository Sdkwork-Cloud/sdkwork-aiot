version: 1
defaultProfile: cloud.production

profiles:
  cloud.production:
    install:
      layout: binary-package
    expose:
      - domain: aiot.sdkwork.com
        tls: sdkwork.com
        mode: web+api
        web: adaptive
    packages:
      - server

  standalone.production:
    install:
      layout: binary-package
    expose:
      - domain: aiot.local
        tls: off
        mode: web+api
        web: adaptive
    packages:
      - server

  standalone.development:
    expose:
      - domain: localhost
        tls: off
        mode: web+api
        web: adaptive
    packages: []
